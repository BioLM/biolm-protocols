# Boltz2 folding from list of sequences. Batch size 1 per Boltz2 request.
# Uses gather (into: 1) + foreach to subtask each sequence. Optional co-fold: one static ligand (SMILES) can be paired with each input.
name: Boltz2 Cofolding Pulldown (Sequences / SMILES → CIF)
description: Co-fold a list of protein, DNA, or RNA sequences with a single small-molecule ligand (SMILES) using Boltz2. Each sequence is processed individually (batch size 1) and paired with the same ligand to produce mmCIF structures.

example_inputs:
  sequences: ["MKFLKFSLLTAVLLSKVVFAGFSSCGDDDD", "GLPRKQILCRAIGLPRKILCAI", "MKTWVPEIGQGG"]
  molecule_type: "protein"
  cofold_smiles: "CC(C)C(=O)Nc1ccccc1"
  cofold_molecule_type: "ligand"
  cofold_chain_id: "B"
  recycling_steps: 3
  sampling_steps: 20
  diffusion_samples: 1
  step_scale: 1.638
  seed: 42
  potentials: true
  include: []
  max_msa_seqs: 8192
  subsample_msa: false
  num_subsampled_msa: 1024
  affinity_mw_correction: false
  sampling_steps_affinity: 200
  diffusion_samples_affinity: 5
  deduplication: false

concurrency:
  workflow: 1
  tasks: 14

inputs:
  sequences:
    type: list_of_str
    label: Sequences
    required: true
    max_length: 10000
    initial: []
    help_text: List of sequences for structure prediction (protein, DNA, or RNA residue sequences; or SMILES strings if molecule type is ligand)
  molecule_type:
    type: select
    label: Molecule type
    required: true
    initial: "protein"
    choices: ["protein", "dna", "rna", "ligand"]
    help_text: Entity type for the list (protein, DNA, or RNA sequences; or ligand for SMILES strings)
  recycling_steps:
    type: integer
    label: Recycling steps
    optional: true
    initial: '3'
    min: 1
    max: 10
    help_text: Number of recycling iterations during structure prediction
  sampling_steps:
    type: integer
    label: Sampling steps
    optional: true
    initial: '20'
    min: 1
    max: 200
    help_text: Number of diffusion sampling steps during structure prediction
  diffusion_samples:
    type: integer
    label: Diffusion samples
    optional: true
    initial: '1'
    min: 1
    max: 10
    help_text: Number of structure samples to generate per item
  step_scale:
    type: float
    label: Step scale
    optional: true
    advanced: true
    initial: '1.638'
    min: 0.1
    max: 10.0
    help_text: Scaling factor for the diffusion step schedule
  seed:
    type: integer
    label: Random seed
    optional: true
    initial: '42'
    help_text: Random seed for sampling
  potentials:
    type: boolean
    label: Physics potentials
    optional: true
    initial: true
    help_text: Enable physics-based steering potentials during inference
  include:
    type: multiselect
    label: Additional outputs
    optional: true
    advanced: true
    initial: []
    choices: ["pae", "pde", "plddt", "embeddings"]
    help_text: Extra outputs to return (pae, pde, plddt, embeddings)
  max_msa_seqs:
    type: integer
    label: Max MSA sequences
    optional: true
    advanced: true
    initial: '8192'
    min: 1
    max: 32768
    help_text: Maximum number of MSA sequences for prediction
  subsample_msa:
    type: boolean
    label: Subsample MSA
    optional: true
    advanced: true
    initial: false
    help_text: Whether to subsample MSA sequences
  num_subsampled_msa:
    type: integer
    label: Num subsampled MSA
    optional: true
    advanced: true
    initial: '1024'
    min: 1
    max: 8192
    help_text: Number of MSA sequences if subsample_msa is true
  affinity_mw_correction:
    type: boolean
    label: Affinity MW correction
    optional: true
    advanced: true
    initial: false
    help_text: Apply molecular-weight correction to affinity_pred_value
  sampling_steps_affinity:
    type: integer
    label: Sampling steps (affinity)
    optional: true
    advanced: true
    initial: '200'
    min: 1
    max: 200
    help_text: Sampling steps for affinity prediction
  diffusion_samples_affinity:
    type: integer
    label: Diffusion samples (affinity)
    optional: true
    advanced: true
    initial: '5'
    min: 1
    max: 50
    help_text: Diffusion samples for affinity prediction
  deduplication:
    type: boolean
    label: Deduplicate output
    optional: true
    initial: false
    help_text: Remove duplicate records (by sequence) from results
  cofold_smiles:
    type: str
    label: Co-fold ligand (SMILES)
    optional: true
    initial: ""
    help_text: Optional small-molecule SMILES to co-fold with each input (e.g. a ligand). Leave empty for single-molecule folding.
  cofold_molecule_type:
    type: select
    label: Co-fold molecule type
    optional: true
    initial: ""
    choices: ["", "ligand"]
    help_text: Set to 'ligand' when providing a co-fold SMILES; leave empty when not co-folding.
  cofold_chain_id:
    type: str
    label: Co-fold chain ID
    optional: true
    initial: ""
    help_text: Chain ID for the co-fold ligand (e.g. B). Leave empty when not co-folding.

progress:
  total_expected: ${{ len(sequences) }}

ranking:
  field: confidence_score
  order: descending
  top_n: 10

writing:
  deduplicate: ${{ deduplication }}

tasks:
  - id: sequences_batch
    type: gather
    from: sequences
    fields: [sequence]
    into: 1
    skip_if_empty: true

  - id: boltz2_predict
    slug: boltz2
    action: predict
    depends_on: [sequences_batch]
    foreach: ${{ sequences_batch.results }}
    skip_if_empty: true
    request_body:
      params:
        recycling_steps: ${{ recycling_steps }}
        sampling_steps: ${{ sampling_steps }}
        diffusion_samples: ${{ diffusion_samples }}
        step_scale: ${{ step_scale }}
        seed: ${{ seed }}
        potentials: ${{ potentials }}
        include: ${{ include }}
        max_msa_seqs: ${{ max_msa_seqs }}
        subsample_msa: ${{ subsample_msa }}
        num_subsampled_msa: ${{ num_subsampled_msa }}
        affinity_mw_correction: ${{ affinity_mw_correction }}
        sampling_steps_affinity: ${{ sampling_steps_affinity }}
        diffusion_samples_affinity: ${{ diffusion_samples_affinity }}
      items:
        - molecules:
            - id: "A"
              type: ${{ molecule_type }}
              sequence: ${{ item.sequence }}
            - id: ${{ cofold_chain_id }}
              type: ${{ cofold_molecule_type }}
              smiles: ${{ cofold_smiles }}
    response_mapping:
      cif: ${{ response.results[*].cif }}
      confidence_score: ${{ response.results[*].confidence.confidence_score }}
      ptm: ${{ response.results[*].confidence.ptm }}
      iptm: ${{ response.results[*].confidence.iptm }}
      ligand_iptm: ${{ response.results[*].confidence.ligand_iptm }}
      protein_iptm: ${{ response.results[*].confidence.protein_iptm }}
      complex_plddt: ${{ response.results[*].confidence.complex_plddt }}
      complex_iplddt: ${{ response.results[*].confidence.complex_iplddt }}
      complex_pde: ${{ response.results[*].confidence.complex_pde }}
      complex_ipde: ${{ response.results[*].confidence.complex_ipde }}
    fail_on_error: true
