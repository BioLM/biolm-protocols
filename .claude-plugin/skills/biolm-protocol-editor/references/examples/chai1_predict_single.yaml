name: Chai1 Predict (Sequence to CIF)
description: Predict 3D structure (mmCIF) for a single protein sequence using Chai1.

example_inputs:
  sequence: "MKFLKFSLLTAVLLSVVFAFSSCGDDDD"

inputs:
  sequence:
    type: text
    label: Protein sequence
    required: true
    help_text: Amino acid sequence for structure prediction (Chai1, max 1024 residues)
    initial: ''
    min_length: 1
    max_length: 1024

progress:
  total_expected: 1

ranking:
  field: cif
  order: ascending
  top_n: 10

tasks:
  - id: chai1_predict
    slug: chai1
    action: predict
    request_body:
      items:
        - molecules:
            - name: "A"
              type: "protein"
              sequence: ${{ sequence }}
      params: {}
    response_mapping:
      cif: ${{ response.results[0][0].cif }}
    fail_on_error: true
