name: DSM Generate
description: Generate protein or masked-protein sequences (optional context) for design or exploration.

example_inputs:
  sequence: "M<mask><mask>FVAIASV<mask><mask>ALA<eos>"
  num_sequences: 200
  temperature: 0.9
  top_k: 50
  top_p: 0.9
  max_length: 80
  step_divisor: 100
  remasking: "low_confidence"
  deduplication: true

concurrency:
  workflow: 1
  tasks: 10 

inputs:
  sequence:
    type: text
    label: Sequence (optional)
    optional: true
    help_text: Optional masked or empty sequence for unconditional generation
    initial: 'MKTFFVA<mask>ILLLASVAA<eos>'
    min_length: 10
    max_length: 2048
  num_sequences:
    type: integer
    label: Num sequences
    optional: true
    initial: '1'
    min: 1
    max: 102400
    help_text: Number of sequences to generate (via parallel subtasks, up to 32 per batch; at least this many returned)
  temperature:
    type: float
    label: Temperature
    optional: true
    initial: '1.0'
    min: 0.1
    max: 2.0
    help_text: Sampling temperature
  top_k:
    type: integer
    label: Top K
    optional: true
    initial: '50'
    min: 1
    max: 1000
    help_text: Top-k sampling; number of highest-probability tokens to consider
  top_p:
    type: float
    label: Top P
    optional: true
    initial: '0.9'
    min: 0.0
    max: 1.0
    help_text: Nucleus sampling; cumulative probability threshold
  max_length:
    type: integer
    label: Max length
    optional: true
    initial: '128'
    min: 10
    max: 2048
    help_text: Max sequence length (optional; omit for from-input)
  step_divisor:
    type: integer
    label: Step divisor
    optional: true
    advanced: true
    initial: '100'
    min: 1
    max: 1000
    help_text: Step divisor for diffusion (lower = slower but better quality)
  remasking:
    type: select
    label: Remasking
    optional: true
    advanced: true
    initial: 'random'
    choices: ["low_confidence", "random", "low_logit", "dual"]
    help_text: Remasking strategy for diffusion
  deduplication:
    type: boolean
    label: Deduplicate output
    optional: true
    initial: true
    help_text: Remove duplicate generated records from results

progress:
  total_expected: ${{ num_sequences }}

writing:
  deduplicate: ${{ deduplication }}

ranking:
  field: log_prob
  order: descending
  top_n: 10

tasks:
  - id: dsm_generate
    slug: dsm-650m-base
    action: generate
    subtasks:
      count: ${{ (num_sequences + 31) // 32 }}
      split_params:
        num_sequences: ${{ min(32, max(0, num_sequences - subtask.index * 32)) }}
    request_body:
      params:
        num_sequences: ${{ num_sequences }}
        temperature: ${{ temperature }}
        top_k: ${{ top_k }}
        top_p: ${{ top_p }}
        max_length: ${{ max_length }}
        step_divisor: ${{ step_divisor }}
        remasking: ${{ remasking }}
      items:
        - sequence: ${{ sequence }}
    response_mapping:
      sequence: ${{ response.results[0][*].sequence }}
      log_prob: ${{ response.results[0][*].log_prob }}
      perplexity: ${{ response.results[0][*].perplexity }}
    fail_on_error: true
