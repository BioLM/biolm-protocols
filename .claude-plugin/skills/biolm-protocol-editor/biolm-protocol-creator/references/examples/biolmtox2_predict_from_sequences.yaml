name: BioLMTox2 Predict from Sequences
description: Predict toxicity (toxin / not-toxin) for a list of protein sequences in batches.

example_inputs:
  sequences: ["MKFLKFSLLTAVLLSVVFAFSSCGDDDD", "GLPRKILCAI"]
  batch_size: 16
  deduplication: false

inputs:
  sequences:
    type: list_of_str
    label: Protein sequences
    required: true
    max_length: 10000
    help_text: List of protein sequences for toxicity prediction
  batch_size:
    type: integer
    label: Batch Size
    optional: true
    advanced: true
    initial: '16'
    min: 1
    max: 16
    help_text: Number of sequences per batch
  deduplication:
    type: boolean
    label: Deduplicate output
    optional: true
    initial: false
    help_text: Remove duplicate records (by sequence) from results

progress:
  total_expected: ${{ len(sequences) }}

ranking:
  field: score
  order: descending
  top_n: 10

writing:
  deduplicate: ${{ deduplication }}

tasks:
  - id: sequences_batch
    type: gather
    from: sequences
    fields: [sequence]
    into: ${{ batch_size }}
    skip_if_empty: true

  - id: biolmtox2_predict
    slug: biolmtox2
    action: predict
    depends_on: [sequences_batch]
    foreach: ${{ sequences_batch.results }}
    skip_if_empty: true
    request_body:
      items: ${{ item }}
    response_mapping:
      label: ${{ response.results[*].label }}
      score: ${{ response.results[*].score }}
    fail_on_error: true
