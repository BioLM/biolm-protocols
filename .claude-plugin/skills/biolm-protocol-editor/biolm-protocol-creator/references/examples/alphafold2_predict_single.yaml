name: AlphaFold2 Predict (Sequence to PDB)
description: Predict 3D structure (PDB) for a single protein sequence using AlphaFold2. Configurable MSA databases, relaxation, and search options.

example_inputs:
  sequence: "MKFLKFSLLTAVLLSVVFAFSSCGDDDD"
  database: "small_bfd"
  predictions_per_model: 1
  relax: "none"
  msa_iterations: 1
  max_msa_sequences: 1000
  algorithm: "mmseqs2"

inputs:
  sequence:
    type: text
    label: Protein sequence
    required: true
    help_text: Amino acid sequence for AlphaFold2 (max 512 residues)
    initial: ''
    min_length: 1
    max_length: 512
  database:
    type: select
    label: MSA database
    optional: true
    initial: 'uniref90'
    choices: ["mgnify", "small_bfd", "uniref90"]
    help_text: Single database for MSA search. Passed as a one-element list to the API.
  predictions_per_model:
    type: integer
    label: Predictions per model
    optional: true
    advanced: true
    initial: '1'
    min: 1
    help_text: Number of predictions per model
  relax:
    type: select
    label: Relaxation
    optional: true
    initial: 'none'
    choices: ["none", "all", "best"]
    help_text: Post-prediction relaxation mode (none = fastest; all/best add Amber relaxation).
  msa_iterations:
    type: integer
    label: MSA iterations
    optional: true
    advanced: true
    initial: '1'
    min: 1
    max: 5
    help_text: Number of MSA refinement iterations (1–5; higher = slower, often better).
  max_msa_sequences:
    type: integer
    label: Max MSA sequences
    optional: true
    advanced: true
    initial: '1000'
    min: 1
    help_text: Maximum sequences to use in the MSA.
  algorithm:
    type: select
    label: MSA algorithm
    optional: true
    advanced: true
    initial: 'mmseqs2'
    choices: ["mmseqs2"]
    help_text: Algorithm used for MSA search.

progress:
  total_expected: 1

ranking:
  field: pdb
  order: ascending
  top_n: 10

tasks:
  - id: alphafold2_predict
    slug: alphafold2
    action: predict
    request_body:
      items:
        - sequence: ${{ sequence }}
      params:
        databases:
          - ${{ database }}
        predictions_per_model: ${{ predictions_per_model }}
        relax: ${{ relax }}
        return_templates: false
        msa_iterations: ${{ msa_iterations }}
        max_msa_sequences: ${{ max_msa_sequences }}
        algorithm: ${{ algorithm }}
    response_mapping:
      pdb: ${{ response.results[*].pdbs[0] }}
    fail_on_error: true
