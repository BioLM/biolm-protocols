name: Peptide / Protein Features from Sequences
description: Compute physicochemical and structural features for a list of protein/peptide sequences in batches.

example_inputs:
  sequences: ["MKFLKFSLLTAVLLSVVFAFSSCGDDDD", "GLPRKILCAI", "MKFLKFSLLTAVLLSVVFAFSSCGDDDD", "GLPRKILCAI", "MKFLKFSLLTAVLLSVVFAFSSCGDDDD", "GLPRKILCAI", "MKFLKFSLLTAVLLSVVFAFSSCGDDDD", "GLPRKILCAI", "MKFLKFSLLTAVLLSVVFAFSSCGDDDD", "GLPRKILCAI"]
  batch_size: 10
  deduplication: false

inputs:
  sequences:
    type: list_of_str
    label: Protein sequences
    required: true
    max_length: 10000
    help_text: List of amino acid sequences for feature computation
  batch_size:
    type: integer
    label: Batch size
    optional: true
    advanced: true
    initial: '10'
    min: 1
    max: 10
    help_text: Number of sequences per batch
  deduplication:
    type: boolean
    label: Deduplicate output
    optional: true
    initial: false
    help_text: Remove duplicate records (by sequence) from results; default false keeps one record per input sequence

progress:
  total_expected: ${{ len(sequences) }}

ranking:
  field: molecular_weight
  order: descending
  top_n: 10

writing:
  deduplicate: ${{ deduplication }}

tasks:
  - id: sequences_batch
    type: gather
    from: sequences
    fields: [sequence]
    into: ${{ batch_size }}
    skip_if_empty: true

  - id: peptides_encode
    slug: peptides
    action: encode
    depends_on: [sequences_batch]
    foreach: ${{ sequences_batch.results }}
    skip_if_empty: true
    request_body:
      params:
        include: []
      items: ${{ item }}
    response_mapping:
      aliphatic_index: ${{ response.results[*].features.aliphatic_index }}
      boman: ${{ response.results[*].features.boman }}
      charge: ${{ response.results[*].features.charge }}
      AF1: ${{ response.results[*].features.AF1 }}
      AF2: ${{ response.results[*].features.AF2 }}
      AF3: ${{ response.results[*].features.AF3 }}
      AF4: ${{ response.results[*].features.AF4 }}
