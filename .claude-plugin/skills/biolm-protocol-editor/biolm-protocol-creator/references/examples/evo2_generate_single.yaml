name: Evo2 Generate
description: Generate DNA sequence from a prompt using Evo2 1B (single continuation).

example_inputs:
  prompt: "ACGTACGTAC"
  max_new_tokens: 10
  temperature: 1.0
  top_k: 4
  top_p: 1.0
  num_sequences: 100
  deduplication: true

concurrency:
  workflow: 1
  tasks: 10

inputs:
  prompt:
    type: text
    label: DNA prompt
    required: true
    help_text: DNA sequence used as prompt for generation (1-4096 chars)
    initial: ''
    min_length: 1
    max_length: 4096
  max_new_tokens:
    type: integer
    label: Max new tokens
    optional: true
    initial: '100'
    min: 1
    max: 4096
    help_text: Maximum number of tokens to generate
  temperature:
    type: float
    label: Temperature
    optional: true
    initial: '1.0'
    min: 0.0
    help_text: Sampling temperature (higher = more random)
  top_k:
    type: integer
    label: Top K
    optional: true
    initial: '4'
    min: 1
    help_text: Top-k sampling (consider only top k tokens)
  top_p:
    type: float
    label: Top P
    optional: true
    initial: '1.0'
    min: 0.0
    max: 1.0
    help_text: Nucleus sampling threshold (0-1)
  num_sequences:
    type: integer
    label: Num sequences
    optional: true
    initial: '100'
    min: 1
    max: 50000
    step: 1
    help_text: Number of sequences to generate (via subtasks; 1 per request)
  deduplication:
    type: boolean
    label: Deduplicate output
    optional: true
    initial: true
    help_text: Remove duplicate generated records from results

progress:
  total_expected: ${{ num_sequences }}

writing:
  deduplicate: ${{ deduplication }}

ranking:
  field: generated
  order: ascending
  top_n: 10

tasks:
  - id: evo2_generate
    slug: evo2-1b-base
    action: generate
    subtasks:
      count: ${{ num_sequences }}
      split_params: {}
    request_body:
      params:
        max_new_tokens: ${{ max_new_tokens }}
        temperature: ${{ temperature }}
        top_k: ${{ top_k }}
        top_p: ${{ top_p }}
      items:
        - prompt: ${{ prompt }}
    response_mapping:
      generated: ${{ response.results[*].generated }}
    fail_on_error: true
