name: ZymCTRL Generate
description: Generate enzyme sequences from an EC number for enzyme design or discovery.
example_inputs:
  ec_number: 3.5.5.1
  num_samples: 500
  max_length: 256
  temperature: 0.8
  deduplication: true
concurrency:
  workflow: 1
  tasks: 10
inputs:
  ec_number:
    type: text
    label: EC number
    required: true
    help_text: EC number (e.g. 3.5.5.1 or partial 3.5.5)
    initial: 3.5.5.1
  num_samples:
    type: integer
    label: Num samples
    optional: true
    initial: '5'
    min: 1
    max: 50000
    help_text: Number of sequences to generate (via parallel subtasks, up to 20 per
      call; at least this many returned)
  max_length:
    type: integer
    label: Max length
    optional: true
    initial: '256'
    min: 50
    max: 1024
    help_text: Maximum sequence length
  temperature:
    type: float
    label: Temperature
    optional: true
    initial: '0.8'
    min: 0.0
    max: 2.0
    help_text: Sampling temperature
  top_k:
    type: integer
    label: Top K
    optional: true
    advanced: true
    initial: '9'
    min: 1
    max: 50
    help_text: Top-k sampling (advanced)
  repetition_penalty:
    type: float
    label: Repetition penalty
    optional: true
    advanced: true
    initial: '1.2'
    min: 1.0
    max: 2.0
    help_text: Repetition penalty (advanced)
  deduplication:
    type: boolean
    label: Deduplicate output
    optional: true
    initial: true
    help_text: Remove duplicate generated records from results
progress:
  total_expected: ${{ num_samples }}
writing:
  deduplicate: ${{ deduplication }}
ranking:
  field: perplexity
  order: ascending
  top_n: 10
tasks:
- id: zymctrl_generate
  slug: zymctrl
  action: generate
  subtasks:
    count: ${{ (num_samples + 19) // 20 }}
    split_params:
      num_samples: ${{ min(20, max(0, num_samples - subtask.index * 20)) }}
  request_body:
    params:
      num_samples: ${{ num_samples }}
      max_length: ${{ max_length }}
      temperature: ${{ temperature }}
      top_k: ${{ top_k }}
      repetition_penalty: ${{ repetition_penalty }}
    items:
    - ec_number: ${{ ec_number }}
  response_mapping:
    sequence: ${{ response.results[0][*].sequence }}
    perplexity: ${{ response.results[0][*].perplexity }}
  fail_on_error: true
