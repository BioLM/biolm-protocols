name: Boltz2 Predict (Sequence to CIF)
description: Predict 3D structure (mmCIF) for a single protein sequence using Boltz2.
example_inputs:
  sequence: MKFLKFSLLTAVLLSVVFAFSSCGDDDD
inputs:
  sequence:
    type: text
    label: Protein sequence
    required: true
    help_text: Amino acid sequence for structure prediction
    initial: ''
    min_length: 1
    max_length: 1024
progress:
  total_expected: 1
ranking:
  field: confidence_score
  order: descending
  top_n: 10
tasks:
- id: boltz2_predict
  slug: boltz2
  action: predict
  request_body:
    items:
    - molecules:
      - id: A
        type: protein
        sequence: ${{ sequence }}
    params: {}
  response_mapping:
    cif: ${{ response.results[*].cif }}
    confidence_score: ${{ response.results[*].confidence.confidence_score }}
    ptm: ${{ response.results[*].confidence.ptm }}
  fail_on_error: true
