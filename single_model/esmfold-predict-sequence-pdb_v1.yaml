name: ESMFold Predict (Sequence to PDB)
description: Predict 3D structure (PDB) for a single protein sequence using ESMFold.
example_inputs:
  sequence: MKFLKFSLLTAVLLSVVFAFSSCGDDDD
inputs:
  sequence:
    type: text
    label: Protein sequence
    required: true
    help_text: Amino acid sequence for structure prediction
    initial: ''
    min_length: 1
    max_length: 768
progress:
  total_expected: 1
ranking:
  field: mean_plddt
  order: descending
  top_n: 10
tasks:
- id: esmfold_predict
  slug: esmfold
  action: predict
  request_body:
    items:
    - sequence: ${{ sequence }}
  response_mapping:
    pdb: ${{ response.results[*].pdb }}
    mean_plddt: ${{ response.results[*].mean_plddt }}
    ptm: ${{ response.results[*].ptm }}
  fail_on_error: true
